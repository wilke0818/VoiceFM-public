# SMOKE TEST — identical to exp_whisper_ft4_gsd_v3_seed42 but 2 epochs.
# Validates: config merge, Whisper large-v2 build from cached weights, data load
# (846-cohort via audio filter), micro-batch 32 forward/backward (OOM check), first
# checkpoint write to scratch. NOT a real run — delete checkpoints after.
model:
  audio_encoder:
    type: whisper
    backbone: openai/whisper-large-v2
    freeze_backbone: true
    unfreeze_last_n: 4
    projection_dim: 256
loss:
  hard_negative_mining: true
  hard_negative_beta: 1.0
batch_size: 8
gradient_accumulation_steps: 8
data:
  use_gsd: true
  splits:
    train: 0.70
    val: 0.15
    test: 0.15
    seed: 42
    stratify_by: disease_category
training:
  epochs: 2
  eval_every_n_epochs: 1
